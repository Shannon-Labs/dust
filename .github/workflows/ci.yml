name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Test workspace
        run: cargo test --workspace --exclude dust-testing
      - name: Test dust-testing library
        run: cargo test -p dust-testing --lib

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Test xtask
        run: cargo test -p xtask
      - name: Smoke test templates and site generation
        run: cargo run -p xtask -- smoke
      - name: Build release binary for install parity
        run: cargo build --release -p dust-cli
      - name: Smoke test install path against packaged artifact
        shell: bash
        run: |
          set -euo pipefail
          version="v$(cargo pkgid -p dust-cli | sed -E 's/.*[#@]//')"

          case "$(uname -s)" in
            Linux) platform="linux" ;;
            Darwin) platform="darwin" ;;
            *)
              echo "unsupported platform $(uname -s)" >&2
              exit 1
              ;;
          esac

          case "$(uname -m)" in
            x86_64|amd64) arch="x86_64" ;;
            arm64|aarch64) arch="aarch64" ;;
            *)
              echo "unsupported architecture $(uname -m)" >&2
              exit 1
              ;;
          esac

          archive="dust-${version}-${platform}-${arch}.tar.gz"
          mkdir -p dist
          cp target/release/dust dist/dust
          chmod +x dist/dust
          tar -C dist -czf "$archive" dust
          cargo run -p xtask -- release-parity --archive "$archive"

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Package publishable workspace crates
        run: cargo package --workspace --exclude dust-testing --exclude xtask
