name: Cargo Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: Version bump level for cargo-release
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - release
          - rc
          - beta
          - alpha
      execute:
        description: Publish crates, tag, and push
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: cargo-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-release
        run: cargo install cargo-release --locked --version 1.1.2

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Cargo release dry run
        if: ${{ !inputs.execute }}
        run: cargo release "${{ inputs.level }}" --workspace --exclude dust-testing --exclude xtask --no-confirm

      - name: Cargo release execute
        if: ${{ inputs.execute }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo release "${{ inputs.level }}" --workspace --exclude dust-testing --exclude xtask --execute --no-confirm
