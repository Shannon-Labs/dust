name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            platform: darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p dust-cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/dust dist/
          cd dist
          tar czf ../dust-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz dust

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/dust.exe dist/
          Compress-Archive -Path dist/dust.exe -DestinationPath dust-${{ github.ref_name }}-${{ matrix.platform }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dust-${{ matrix.platform }}
          path: |
            dust-*.tar.gz
            dust-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dust-*.tar.gz
            dust-*.zip
          generate_release_notes: true
