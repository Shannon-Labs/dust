name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: dust-x86_64-linux.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: dust-aarch64-linux.tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            archive: dust-x86_64-macos.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: dust-aarch64-macos.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release -p dust-cli --target "${{ matrix.target }}"
        env:
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          binary=""
          for candidate in \
            "target/${{ matrix.target }}/release/dust" \
            "target/${{ matrix.target }}/release/dust-cli"; do
            if [ -f "$candidate" ]; then
              binary="$candidate"
              break
            fi
          done

          if [ -z "$binary" ]; then
            echo "release binary not found for ${{ matrix.target }}" >&2
            exit 1
          fi

          cp "$binary" dist/dust
          chmod +x dist/dust
          tar -C dist -czf "${{ matrix.archive }}" dust

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Generate changelog
        shell: bash
        run: |
          set -euo pipefail

          previous_tag="$(git tag --merged "$GITHUB_SHA" --sort=-v:refname | grep -Fxv "$GITHUB_REF_NAME" | head -n 1 || true)"

          {
            echo "## Changelog"
            echo
            if [ -n "$previous_tag" ]; then
              echo "Changes since \`$previous_tag\`:"
              echo
              git log --no-merges --pretty='- %s (%h)' "${previous_tag}..${GITHUB_SHA}"
            else
              echo "- Initial release"
            fi
          } > CHANGELOG.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: dist/*.tar.gz
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          tag_name: ${{ github.ref_name }}
